apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespace
  namespace: argocd # The namespace where Argo CD is installed
spec:
  project: default
  source:
    repoURL: https://github.com/SKR-2021/eks-argocd.git
    targetRevision: main
    path: namespace # The directory path within the repository
  destination:
    server: https://kubernetes.default.svc # Current cluster
    namespace: argocd 
  syncPolicy:
      automated:
        prune: true # 
        selfHeal: true