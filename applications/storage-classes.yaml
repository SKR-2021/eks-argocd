apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-classes
  namespace: argocd # The namespace where Argo CD is installed
spec:
  project: default
  source:
    repoURL: https://github.com/SKR-2021/eks-argocd.git
    targetRevision: main
    path: storage-classes # The directory path within the repository
  destination:
    server: https://kubernetes.default.svc # Current cluster
    namespace: argocd 
  syncPolicy:
      automated:
        prune: true # If you delete from Git, argocd also delete it from cluster 
        selfHeal: true # Revert the changes that were done manually in cluster to sync git repo 