apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: dotmart
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: dotmart
  # these are replica set labels 
  labels: 
    project: dotmart
    component: cart
    tier: backend
spec:
  replicas: 1
  selector:
  # these labels are used to select pods
    matchLabels:
      project: dotmart
      component: cart
      tier: backend
  # pod defination 
  template:
    metadata:
      labels:
        project: dotmart
        component: cart
        tier: backend
    spec:
      containers:
      - name: cart
        image: karunakar2000/cart:v3
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: cart
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: cart
spec:
  selector:
    project: dotmart
    component: cart
    tier: backend
  ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port 